name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "app/frontend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/frontend/**"

jobs:
  lint:
    name: Lint (includes accessibility rules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend lint
        run: pnpm run lint
