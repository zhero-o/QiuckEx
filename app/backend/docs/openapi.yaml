openapi: 3.0.3
info:
  title: QuickEx Backend API
  description: >
    QuickEx is a Stellar-based payment platform enabling payment links,
    recurring subscriptions, username resolution, marketplace trading,
    fiat on/off ramps, and webhook-driven event notifications.

    **Base URL (production):** `https://api.quickex.example.com`
    **Base URL (development):** `http://localhost:3000`

    Interactive Swagger UI is available at `/docs` when the server is running.
  version: 1.0.0
  contact:
    name: QuickEx API Support
    url: https://github.com/quickex/quickex
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.quickex.example.com
    description: Production

tags:
  - name: health
    description: Health check endpoints
  - name: usernames
    description: Username management and public profile discovery
  - name: links
    description: Payment link validation, metadata, and bulk generation
  - name: payment-links
    description: Payment link status queries
  - name: recurring-payments
    description: Subscription-style recurring payment links
  - name: scam-alerts
    description: Fraud detection and link scanning
  - name: transactions
    description: Stellar transaction and payment history
  - name: payments
    description: Recent payment queries
  - name: stellar
    description: Verified assets, path preview, quotes, and Soroban preflight
  - name: Webhooks
    description: Webhook endpoint management and delivery
  - name: Notifications
    description: Notification preference management
  - name: marketplace
    description: Username marketplace listings and bids
  - name: api-keys
    description: API key management
  - name: fiat-ramps
    description: Fiat on/off ramp integrations (SEP-24)
  - name: admin/refunds
    description: Refund initiation and management (admin)
  - name: exports
    description: Asynchronous data export
  - name: Telegram
    description: Telegram bot account linkage and notification settings
  - name: reconciliation
    description: Reconciliation worker status and backfill (admin)
  - name: Admin - Job Queue
    description: Job queue monitoring and management (admin)
  - name: metrics
    description: Prometheus metrics endpoints
  - name: assets
    description: Asset metadata, branding, and cache management
  - name: admin/audit
    description: Audit log querying and retention (admin)
  - name: feature-flags
    description: Feature flag evaluation and admin management

security:
  - ApiKeyAuth: []
  - {}

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Health check (liveness)
      description: Returns application health status. Used for liveness probes.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service not ready

  /ready:
    get:
      tags: [health]
      operationId: getReadiness
      summary: Readiness check
      description: >
        Returns readiness status including dependency checks (Supabase, environment).
        Used for readiness probes.
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Service not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  # ---------------------------------------------------------------------------
  # Usernames
  # ---------------------------------------------------------------------------
  /username:
    post:
      tags: [usernames]
      operationId: createUsername
      summary: Create a new username
      description: >
        Registers a new username for a Stellar wallet. Username must be 3-32 characters,
        lowercase alphanumeric with underscores. Duplicate usernames return 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUsernameRequest"
      responses:
        "201":
          description: Username created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUsernameResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Wallet has reached maximum usernames
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [usernames]
      operationId: listUsernames
      summary: List usernames for a wallet
      description: Returns all usernames registered for the given Stellar public key.
      parameters:
        - name: publicKey
          in: query
          required: true
          schema:
            type: string
          description: Stellar public key (G...)
      responses:
        "200":
          description: List of usernames
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsernamesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /username/search:
    get:
      tags: [usernames]
      operationId: searchUsernames
      summary: Search public profiles (fuzzy)
      description: >
        Fuzzy search for public usernames sorted by similarity score.
        Only profiles with public visibility enabled appear in results.
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term (min 2 characters)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque pagination cursor
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchUsernamesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /username/trending:
    get:
      tags: [usernames]
      operationId: getTrendingCreators
      summary: Get trending creators
      description: Returns trending creator profiles ranked by transaction volume.
      parameters:
        - name: timeWindowHours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 720
            default: 24
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trending creators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingCreatorsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /username/recently-active:
    get:
      tags: [usernames]
      operationId: getRecentlyActive
      summary: Get recently active users
      description: Returns users recently active based on payment activity.
      parameters:
        - name: timeWindowHours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recently active users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentlyActiveResponse"

  /username/toggle-public:
    post:
      tags: [usernames]
      operationId: togglePublicProfile
      summary: Toggle public profile visibility
      description: Enable or disable public profile visibility for a username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TogglePublicRequest"
      responses:
        "200":
          description: Visibility toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Links
  # ---------------------------------------------------------------------------
  /links/metadata:
    post:
      tags: [links]
      operationId: generateLinkMetadata
      summary: Generate canonical link metadata
      description: Validates payment link parameters and generates canonical metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkMetadataRequest"
      responses:
        "200":
          description: Metadata generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/LinkMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimit"

  /links/bulk/generate:
    post:
      tags: [links]
      operationId: generateBulkLinks
      summary: Generate bulk payment links (JSON)
      description: Generate up to 500 payment links in a single request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPaymentLinkRequest"
      responses:
        "200":
          description: Links generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPaymentLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /links/bulk/generate/csv:
    post:
      tags: [links]
      operationId: generateBulkLinksCSV
      summary: Generate bulk payment links from CSV
      description: >
        Upload a CSV file to generate payment links. CSV must have an "amount" column.
        Supports: amount, asset, memo, memoType, username, destination, referenceId,
        privacy, expirationDays, acceptedAssets (pipe-separated).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Links generated from CSV
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPaymentLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /links/scan:
    post:
      tags: [scam-alerts]
      operationId: scanLink
      summary: Scan a payment link for scam indicators
      description: Analyzes a payment link using heuristic rules to detect potential scams.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanLinkRequest"
      responses:
        "200":
          description: Scan completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------------------------------------------------------------------------
  # Payment Links
  # ---------------------------------------------------------------------------
  /payment-links/status:
    get:
      tags: [payment-links]
      operationId: getPaymentLinkStatus
      summary: Get payment link status
      description: >
        Returns the current state (active/expired/paid/refunded) of a payment link.
        Checks on-chain to determine if paid.
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
        - name: amount
          in: query
          required: true
          schema:
            type: string
        - name: asset
          in: query
          schema:
            type: string
            default: XLM
        - name: memo
          in: query
          schema:
            type: string
        - name: acceptedAssets
          in: query
          schema:
            type: string
          description: Comma-separated list of accepted assets
      responses:
        "200":
          description: Payment link status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLinkStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Recurring Payments
  # ---------------------------------------------------------------------------
  /links/recurring:
    post:
      tags: [recurring-payments]
      operationId: createRecurringLink
      summary: Create a recurring payment link
      description: Creates a subscription-style payment link with specified frequency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringPaymentLinkRequest"
      responses:
        "201":
          description: Recurring link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RecurringPaymentLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

    get:
      tags: [recurring-payments]
      operationId: listRecurringLinks
      summary: List recurring payment links
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RecurringStatus"
        - name: username
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of recurring payment links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecurringPaymentsResponse"

  /links/recurring/{id}:
    get:
      tags: [recurring-payments]
      operationId: getRecurringLink
      summary: Get recurring payment link by ID
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      responses:
        "200":
          description: Recurring link details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RecurringPaymentLinkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [recurring-payments]
      operationId: updateRecurringLink
      summary: Update recurring payment link
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecurringPaymentLinkRequest"
      responses:
        "200":
          description: Link updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/RecurringPaymentLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/recurring/{id}/cancel:
    post:
      tags: [recurring-payments]
      operationId: cancelRecurringLink
      summary: Cancel recurring payment link
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      responses:
        "200":
          description: Link cancelled
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/recurring/{id}/pause:
    post:
      tags: [recurring-payments]
      operationId: pauseRecurringLink
      summary: Pause recurring payment link
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      responses:
        "200":
          description: Link paused
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/recurring/{id}/resume:
    post:
      tags: [recurring-payments]
      operationId: resumeRecurringLink
      summary: Resume recurring payment link
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      responses:
        "200":
          description: Link resumed
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /links/recurring/{id}/executions:
    get:
      tags: [recurring-payments]
      operationId: getExecutionHistory
      summary: Get execution history
      parameters:
        - $ref: "#/components/parameters/RecurringLinkId"
      responses:
        "200":
          description: Execution history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecurringPaymentExecution"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Transactions
  # ---------------------------------------------------------------------------
  /transactions:
    get:
      tags: [transactions]
      operationId: getTransactions
      summary: Fetch recent Stellar transactions (payments)
      description: >
        Fetches recent payment operations for a given account with caching and resilience.
        Results are cached (default 60s TTL) and support pagination.
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
          description: Stellar public key (G...)
        - name: asset
          in: query
          schema:
            type: string
          description: Filter by asset (XLM, USDC, AQUA, yXLM)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimit"
        "502":
          description: Bad gateway (Horizon error)
        "503":
          description: Horizon rate limit or backoff

  /transactions/compose:
    post:
      tags: [transactions]
      operationId: composeTransaction
      summary: Compose a Soroban transaction
      description: Builds and simulates a Soroban contract invocation transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComposeTransactionRequest"
      responses:
        "200":
          description: Composed transaction result
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------------------------------------------------------------------------
  # Payments
  # ---------------------------------------------------------------------------
  /payments/recent:
    get:
      tags: [payments]
      operationId: getRecentPayments
      summary: Fetch recent payments for an address
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
          description: ISO timestamp or epoch ms
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransactionItem"

  # ---------------------------------------------------------------------------
  # Stellar
  # ---------------------------------------------------------------------------
  /stellar/verified-assets:
    get:
      tags: [stellar]
      operationId: getVerifiedAssets
      summary: List verified assets with metadata
      description: Returns all verified assets with branding metadata from TOML files.
      responses:
        "200":
          description: Verified assets list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"

  /stellar/path-preview:
    post:
      tags: [stellar]
      operationId: pathPreview
      summary: Strict-receive path preview
      description: Returns candidate paths for a fixed destination amount.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathPreviewRequest"
      responses:
        "200":
          description: Path preview results
        "400":
          $ref: "#/components/responses/BadRequest"

  /stellar/path-preview/strict-send:
    post:
      tags: [stellar]
      operationId: strictSendPathPreview
      summary: Strict-send path preview
      description: Returns candidate paths for a fixed source amount.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrictSendPathPreviewRequest"
      responses:
        "200":
          description: Path preview results
        "400":
          $ref: "#/components/responses/BadRequest"

  /stellar/soroban-preflight:
    post:
      tags: [stellar]
      operationId: sorobanPreflight
      summary: Run Soroban preflight simulation
      description: Uses the same pipeline as POST /transactions/compose for health_check.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SorobanPreflightRequest"
      responses:
        "200":
          description: Preflight result
        "503":
          description: QUICKEX_CONTRACT_ID not configured

  /stellar/quote:
    post:
      tags: [stellar]
      operationId: createQuote
      summary: Create a path payment quote
      description: >
        Computes path payment routes with slippage tolerance and TTL.
        Returns a quote ID retrievable until expiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "200":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /stellar/quote/{quoteId}:
    get:
      tags: [stellar]
      operationId: getQuote
      summary: Retrieve a quote by ID
      parameters:
        - name: quoteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Quote expired

  # ---------------------------------------------------------------------------
  # Webhooks
  # ---------------------------------------------------------------------------
  /webhooks/{publicKey}:
    post:
      tags: [Webhooks]
      operationId: createWebhook
      summary: Register a new webhook
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
          description: Stellar public key (G...)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List webhooks for a public key
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookResponse"

  /webhooks/{publicKey}/{id}:
    get:
      tags: [Webhooks]
      operationId: getWebhook
      summary: Get webhook details
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Webhooks]
      operationId: updateWebhook
      summary: Update webhook configuration
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Webhooks]
      operationId: deleteWebhook
      summary: Delete a webhook
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Webhook deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /webhooks/{publicKey}/{id}/regenerate-secret:
    post:
      tags: [Webhooks]
      operationId: regenerateSecret
      summary: Regenerate webhook secret
      description: Generate a new signing secret. The old secret immediately stops working.
      parameters:
        - name: publicKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: New secret generated
          content:
