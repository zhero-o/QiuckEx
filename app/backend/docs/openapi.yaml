  /feature-flags/{key}/evaluate:
    get:
      tags: [feature-flags]
      operationId: evaluateFeatureFlag
      summary: Evaluate a feature flag
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation result

components:
  # -------------------------------------------------------------------------
  # Security Schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional API key for higher rate limits

  # -------------------------------------------------------------------------
  # Parameters
  # -------------------------------------------------------------------------
  parameters:
    RecurringLinkId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Recurring payment link ID

  # -------------------------------------------------------------------------
  # Reusable Responses
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimit:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:
    # --- Error ---
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            request_id:
              type: string
              format: uuid
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
            details:
              type: object

    # --- Health ---
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    ReadyResponse:
      type: object
      properties:
        ready:
          type: boolean
        checks:
          type: object

    # --- Usernames ---
    CreateUsernameRequest:
      type: object
      required: [username, publicKey]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[a-z0-9_]+$"
          example: alice_123
        publicKey:
          type: string
          example: GBXGQ55JMQ4L2B6E7S8Y9Z0A1B2C3D4E5F6G7H8I7YWR

    CreateUsernameResponse:
      type: object
      properties:
        ok:
          type: boolean

    ListUsernamesResponse:
      type: object
      properties:
        usernames:
          type: array
          items:
            type: object
            properties:
              username:
                type: string
              publicKey:
                type: string
              isPublic:
                type: boolean

    PublicProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        publicKey:
          type: string
        similarityScore:
          type: number
        lastActiveAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SearchUsernamesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/PublicProfile"
        total:
          type: integer
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    TrendingCreatorsResponse:
      type: object
      properties:
        creators:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/PublicProfile"
              - type: object
                properties:
                  transactionVolume:
                    type: number
                  transactionCount:
                    type: integer
        timeWindowHours:
          type: integer
        calculatedAt:
          type: string
          format: date-time
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    RecentlyActiveResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/PublicProfile"
        timeWindowHours:
          type: integer
        calculatedAt:
          type: string
          format: date-time
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    TogglePublicRequest:
      type: object
      required: [username, publicKey, isPublic]
      properties:
        username:
          type: string
          example: alice
        publicKey:
          type: string
        isPublic:
          type: boolean

    # --- Links ---
    LinkMetadataRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          example: 50.5
          minimum: 0.0000001
          maximum: 1000000000
        memo:
          type: string
          maxLength: 28
        memoType:
          type: string
          enum: [text, id, hash, return]
        asset:
          type: string
          enum: [XLM, USDC, AQUA, yXLM]
        privacy:
          type: boolean
          default: false
        expirationDays:
          type: integer
          minimum: 1
          maximum: 365
        username:
          type: string
          minLength: 1
          maxLength: 32
        destination:
          type: string
          pattern: "^G[A-Z0-9]{55}$"
        referenceId:
          type: string
          maxLength: 64
        acceptedAssets:
          type: array
          items:
            type: string
          minItems: 1

    LinkMetadataResponse:
      type: object
      properties:
        amount:
          type: string
          example: "50.5000000"
        memo:
          type: string
          nullable: true
        memoType:
          type: string
        asset:
          type: string
        privacy:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        canonical:
          type: string
        username:
          type: string
          nullable: true
        destination:
          type: string
          nullable: true
        referenceId:
          type: string
          nullable: true
        acceptedAssets:
          type: array
          items:
            type: string
          nullable: true
        swapOptions:
          type: array
          items:
            $ref: "#/components/schemas/PathPreviewRow"
          nullable: true
        metadata:
          type: object
          properties:
            normalized:
              type: boolean
            warnings:
              type: array
              items:
                type: string

    PathPreviewRow:
      type: object
      properties:
        sourceAmount:
          type: string
        sourceAsset:
          type: string
        destinationAmount:
          type: string
        destinationAsset:
          type: string
        hopCount:
          type: integer
        pathHops:
          type: array
          items:
            type: string
        rateDescription:
          type: string

    BulkPaymentLinkItem:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          minimum: 0.0000001
        asset:
          type: string
        memo:
          type: string
          maxLength: 28
        memoType:
          type: string
          enum: [text, id, hash, return]
        username:
          type: string
          maxLength: 32
        destination:
          type: string
        referenceId:
          type: string
          maxLength: 64
        privacy:
          type: boolean
        expirationDays:
          type: integer
          minimum: 1
          maximum: 365
        acceptedAssets:
          type: array
          items:
            type: string

    BulkPaymentLinkRequest:
      type: object
      required: [links]
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/BulkPaymentLinkItem"
          maxItems: 500

    BulkPaymentLinkResponseItem:
      type: object
      properties:
        id:
          type: string
        canonical:
          type: string
        url:
          type: string
          format: uri
        amount:
          type: string
        asset:
          type: string
        username:
          type: string
        destination:
          type: string
        referenceId:
          type: string
        index:
          type: integer

    BulkPaymentLinkResponse:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        links:
          type: array
          items:
            $ref: "#/components/schemas/BulkPaymentLinkResponseItem"
        processingTimeMs:
          type: integer

    ScanLinkRequest:
      type: object
      required: [assetCode, amount]
      properties:
        assetCode:
          type: string
          enum: [XLM, USDC, AQUA, yXLM]
        amount:
          type: number
        memo:
          type: string
          maxLength: 28
        recipientAddress:
          type: string

    ScanResult:
      type: object
      properties:
        riskScore:
          type: integer
        flags:
          type: array
          items:
            type: string
        recommendation:
          type: string

    # --- Payment Links ---
    PaymentLinkStatus:
      type: object
      properties:
        state:
          type: string
          enum: [DRAFT, ACTIVE, EXPIRED, PAID, REFUNDED]
        username:
          type: string
        amount:
          type: string
        asset:
          type: string
        memo:
          type: string
          nullable: true
        destinationPublicKey:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        transactionHash:
          type: string
          nullable: true
        paidAt:
          type: string
          format: date-time
          nullable: true
        swapOptions:
          type: array
          items:
            $ref: "#/components/schemas/PathPreviewRow"
          nullable: true
        acceptsMultipleAssets:
          type: boolean
        acceptedAssets:
          type: array
          items:
            type: string
          nullable: true
        userMessage:
          type: string
        availableActions:
          type: array
          items:
            type: string

    # --- Recurring Payments ---
    RecurringStatus:
      type: string
      enum: [active, paused, completed, cancelled]

    FrequencyType:
      type: string
      enum: [daily, weekly, monthly, yearly]

    CreateRecurringPaymentLinkRequest:
      type: object
      required: [amount, asset, frequency]
      properties:
        amount:
          type: number
          minimum: 1
        asset:
          type: string
        assetIssuer:
          type: string
        username:
          type: string
        destination:
          type: string
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalPeriods:
          type: integer
          minimum: 1
        memo:
          type: string
        memoType:
          type: string
          enum: [text, id, hash, return]
        referenceId:
          type: string
        privacyEnabled:
          type: boolean
          default: false

    UpdateRecurringPaymentLinkRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 1
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        endDate:
          type: string
          format: date-time
        totalPeriods:
          type: integer
          minimum: 1
        memo:
          type: string
        referenceId:
          type: string

    RecurringPaymentLinkResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        destination:
          type: string
        amount:
          type: number
        asset:
          type: string
        assetIssuer:
          type: string
        frequency:
          $ref: "#/components/schemas/FrequencyType"
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        totalPeriods:
          type: integer
        executedCount:
          type: integer
        nextExecutionDate:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/RecurringStatus"
        memo:
          type: string
        memoType:
          type: string
        referenceId:
          type: string
        privacyEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RecurringPaymentExecution:
      type: object
      properties:
        id:
          type: string
        periodNumber:
          type: integer
        scheduledAt:
          type: string
          format: date-time
        executedAt:
          type: string
          format: date-time
        amount:
          type: number
        asset:
          type: string
        status:
          type: string
          enum: [pending, success, failed, skipped]
        transactionHash:
          type: string
        failureReason:
          type: string
        retryCount:
          type: integer
        notificationSent:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ListRecurringPaymentsResponse:
      type: object
      properties:
        success:
          type: boolean
        total:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/RecurringPaymentLinkResponse"
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
        limit:
          type: integer

    # --- Transactions ---
    TransactionItem:
      type: object
      properties:
        hash:
          type: string
        ledger:
          type: integer
        timestamp:
          type: string
          format: date-time
        sourceAccount:
          type: string
        type:
          type: string
        assetCode:
          type: string
          nullable: true
        assetIssuer:
          type: string
          nullable: true
        amount:
          type: string
        destinationAccount:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        memoType:
          type: string
          nullable: true

    TransactionResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
        pagination:
          type: object
          properties:
            limit:
              type: integer
            cursor:
              type: string
            hasMore:
              type: boolean

    ComposeTransactionRequest:
      type: object
      required: [contractId, method, params, sourceAccount]
      properties:
        contractId:
          type: string
        method:
          type: string
        params:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value: {}
        sourceAccount:
          type: string
        networkPassphrase:
          type: string

    # --- Stellar ---
    AssetRef:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: USDC
        issuer:
          type: string
          nullable: true

    PathPreviewRequest:
      type: object
      required: [destinationAmount, destinationAsset, sourceAssets]
      properties:
        destinationAmount:
          type: string
          example: "10.5"
        destinationAsset:
          $ref: "#/components/schemas/AssetRef"
        sourceAssets:
          type: array
          items:
            $ref: "#/components/schemas/AssetRef"
          minItems: 1

    StrictSendPathPreviewRequest:
      type: object
      required: [sourceAmount, sourceAsset, destinationAssets]
      properties:
        sourceAmount:
          type: string
          example: "10.5"
        sourceAsset:
          $ref: "#/components/schemas/AssetRef"
        destinationAssets:
          type: array
          items:
            $ref: "#/components/schemas/AssetRef"
          minItems: 1

    SorobanPreflightRequest:
      type: object
      required: [sourceAccount]
      properties:
        sourceAccount:
          type: string
          pattern: "^G[A-Z0-9]{55}$"

    CreateQuoteRequest:
      type: object
      required: [destinationAmount, destinationAsset, sourceAssets]
      properties:
        destinationAmount:
          type: string
        destinationAsset:
          $ref: "#/components/schemas/AssetRef"
        sourceAssets:
          type: array
          items:
            $ref: "#/components/schemas/AssetRef"
        maxSlippageBps:
          type: integer
          minimum: 0
          maximum: 10000
          default: 50
        ttlSeconds:
          type: integer
          minimum: 5
          maximum: 300
          default: 30
        preflight:
          type: boolean
          default: false

    QuotePath:
      type: object
      properties:
        sourceAsset:
          type: string
        sourceAmount:
          type: string
        sourceAmountWithSlippage:
          type: string
        destinationAsset:
          type: string
        destinationAmount:
          type: string
        pathHops:
          type: array
          items:
            type: string
        rateDescription:
          type: string

    QuoteResponse:
      type: object
      properties:
        quoteId:
          type: string
        paths:
          type: array
          items:
            $ref: "#/components/schemas/QuotePath"
        expiresAt:
          type: string
          format: date-time
        maxSlippageBps:
          type: integer
        horizonUrl:
          type: string
        preflight:
          type: object
          properties:
            feasible:
              type: boolean
            error:
              type: string

    AssetListResponse:
      type: object
      properties:
        assets:
          type: array
          items:
            type: object

    # --- Webhooks ---
    CreateWebhookRequest:
      type: object
      required: [webhookUrl]
      properties:
        webhookUrl:
          type: string
          format: uri
        label:
          type: string
          maxLength: 100
        events:
          type: array
          items:
            type: string
          nullable: true
          description: Event types to subscribe to. null = all events.
        minAmountStroops:
          type: integer
          minimum: 0
        secret:
          type: string
          maxLength: 128

    UpdateWebhookRequest:
      type: object
      properties:
        webhookUrl:
          type: string
          format: uri
        label:
          type: string
          maxLength: 100
        events:
          type: array
          items:
            type: string
          nullable: true
        minAmountStroops:
          type: integer
        enabled:
          type: boolean

    WebhookResponse:
      type: object
      properties:
        id:
          type: string
        publicKey:
          type: string
        webhookUrl:
          type: string
        label:
          type: string
        secret:
          type: string
        events:
          type: array
          items:
            type: string
          nullable: true
        minAmountStroops:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WebhookDeliveryLog:
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        eventId:
          type: string
        status:
          type: string
        attempts:
          type: integer
        lastError:
          type: string
        httpStatus:
          type: integer
        responseBody:
          type: string
        createdAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time

    WebhookStats:
      type: object
      properties:
        totalSent:
          type: integer
        totalFailed:
          type: integer
        pendingRetries:
          type: integer
        lastDeliveryAt:
          type: string
          format: date-time
        lastError:
          type: string

    RedeliverWebhookRequest:
      type: object
      required: [eventId, eventType]
      properties:
        eventId:
          type: string
        eventType:
          type: string

    # --- Notifications ---
    NotificationPreference:
      type: object
      properties:
        id:
          type: string
        publicKey:
          type: string
        channel:
          type: string
          enum: [email, push, webhook]
        email:
          type: string
        pushToken:
          type: string
        webhookUrl:
          type: string
        webhookSecret:
          type: string
        events:
          type: array
          items:
            type: string
          nullable: true
        minAmountStroops:
          type: string
        enabled:
          type: boolean

    UpsertNotificationPreference:
      type: object
      required: [channel, enabled]
      properties:
        channel:
          type: string
          enum: [email, push, webhook]
        email:
          type: string
        pushToken:
          type: string
        webhookUrl:
          type: string
        webhookSecret:
          type: string
        events:
          type: array
          items:
            type: string
          nullable: true
        minAmountStroops:
          type: number
        enabled:
          type: boolean

    # --- Marketplace ---
    ListUsernameRequest:
      type: object
      required: [username, sellerPublicKey, askingPrice]
      properties:
        username:
          type: string
        sellerPublicKey:
          type: string
        askingPrice:
          type: number
          minimum: 0.0000001

    PlaceBidRequest:
      type: object
      required: [bidderPublicKey, bidAmount]
      properties:
        bidderPublicKey:
          type: string
        bidAmount:
          type: number
          minimum: 0.0000001

    AcceptBidRequest:
      type: object
      required: [sellerPublicKey]
      properties:
        sellerPublicKey:
          type: string

    CancelListingRequest:
      type: object
      required: [sellerPublicKey]
      properties:
        sellerPublicKey:
          type: string

    MarketplaceListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            type: object
        total:
          type: integer
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    # --- API Keys ---
    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 100
        scopes:
          type: array
          items:
            type: string
            enum: [links:read, links:write, transactions:read, usernames:read, refunds:write, admin]
          minItems: 1
        owner_id:
          type: string

    # --- Fiat Ramps ---
    FiatRampRequest:
      type: object
      required: [assetCode, amount, userAccount, anchorDomain]
      properties:
        assetCode:
          type: string
        amount:
          type: number
        userAccount:
          type: string
        anchorDomain:
          type: string

    # --- Refunds ---
    InitiateRefundRequest:
      type: object
      required: [entityType, entityId, idempotencyKey, reasonCode]
      properties:
        entityType:
          type: string
          enum: [payment, escrow, link]
        entityId:
          type: string
        idempotencyKey:
          type: string
        reasonCode:
          type: string
          enum: [DUPLICATE, FRAUD, CUSTOMER_REQUEST, TECHNICAL_ERROR]
        notes:
          type: string

    # --- Exports ---
    RequestExport:
      type: object
      required: [userId, exportType, format, deliveryMethod]
      properties:
        userId:
          type: string
        exportType:
          type: string
          enum: [transactions, links, payments]
        filters:
          type: object
        format:
          type: string
          enum: [csv, json]
        deliveryMethod:
          type: string
          enum: [webhook, email, download]

    # --- Feature Flags ---
    UpdateFeatureFlagRequest:
      type: object
      properties:
        enabled:
          type: boolean
        description:
          type: string
        rules:
          type: object

    # --- Telegram ---
    TelegramLinkStatus:
      type: object
      properties:
        isLinked:
          type: boolean
        isVerified:
          type: boolean
        publicKey:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true
        minAmountXlm:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    UpdateTelegramSettingsRequest:
      type: object
      properties:
        enabled:
          type: boolean
        minAmountStroops:
          type: string

    # --- Reconciliation ---
    BackfillConfig:
      type: object
      properties:
        startLedger:
          type: integer
        endLedger:
          type: integer

    # --- Job Queue ---
    BulkRetryRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]

    BulkRetryResponse:
      type: object
      properties:
        retriedCount:
          type: integer
        jobIds:
          type: array
          items:
            type: string

    JobMetrics:
      type: object
      properties:
        byType:
          type: object
          additionalProperties:
            type: object
            properties:
              pending:
                type: integer
              running:
                type: integer
              completed:
                type: integer
              failed:
                type: integer
              cancelled:
                type: integer
        dlqCount:
          type: integer

    # --- Asset Metadata ---
    AssetMetadataResponse:
      type: object
      properties:
        code:
          type: string
        issuer:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
          format: uri
        tomlUrl:
          type: string
          format: uri
